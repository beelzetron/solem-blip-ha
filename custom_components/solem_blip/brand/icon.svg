<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Solem BL-IP integration icon</title>
  <desc id="desc">Rounded teal app icon with a water drop on a leaf and a small Bluetooth mark.</desc>
  <defs>
    <linearGradient id="tile" x1="44" y1="16" x2="212" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18a999"/>
      <stop offset=".54" stop-color="#0a786f"/>
      <stop offset="1" stop-color="#0d4f67"/>
    </linearGradient>
    <linearGradient id="leaf" x1="61" y1="208" x2="207" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9be15d"/>
      <stop offset="1" stop-color="#27c46a"/>
    </linearGradient>
    <linearGradient id="water" x1="139" y1="44" x2="139" y2="171" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e5fbff"/>
      <stop offset=".72" stop-color="#8be6ff"/>
      <stop offset="1" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#063544" flood-opacity=".28"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#063544" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="46" fill="url(#tile)"/>

  <g opacity=".9" filter="url(#softShadow)">
    <path fill="none" stroke="#f2ffff" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter" d="M53 37v52l22-19-22-18 22-18-22-18v36L36 36m17 34L36 87"/>
  </g>

  <g filter="url(#shadow)">
    <path fill="url(#leaf)" d="M58 204c14-62 59-99 134-109 15-2 29-2 44 0-10 39-33 70-68 89-35 20-76 27-110 20z"/>
    <path fill="#d7ffca" opacity=".72" d="M85 190c48-38 103-65 169-79-47 7-101 28-157 66-12 8-20 14-24 18z"/>
  </g>

  <g filter="url(#softShadow)">
    <path fill="url(#water)" d="M139 42c27 35 55 71 55 102 0 35-25 59-55 59s-55-24-55-59c0-31 28-67 55-102z"/>
    <path fill="#ffffff" opacity=".54" d="M115 91c-14 19-22 37-22 53 0 22 13 37 30 45-9-12-14-27-11-44 2-16 9-32 20-50 4-6-9-12-17-4z"/>
  </g>
</svg>

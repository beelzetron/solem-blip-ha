name: Bug report
description: Report incorrect behavior in the Solem BL-IP integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Include diagnostics and logs where possible.

  - type: input
    id: version
    attributes:
      label: Integration version
      description: Settings → Devices & Services → Solem BL-IP → version shown on the integration tile
      placeholder: "1.2.0"
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.3.0"
    validations:
      required: true

  - type: input
    id: controller
    attributes:
      label: Controller model and firmware
      placeholder: "BL-IP, firmware 5.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install integration version …
        2. Configure controller with … stations
        3. Press …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Settings → System → Logs, or attach the integration diagnostics download.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report
          required: true
        - label: I removed other mobile apps from the controller while testing
          required: false

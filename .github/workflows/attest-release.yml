name: Attest release artifact

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, tag, or SHA to build and attest
        required: true
        default: v1.2.25

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  attest-release:
    name: Build and attest release artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.ref }}

      - name: Build HACS artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path(".")
          dist = root / "dist"
          output = dist / "solem-blip-ha.zip"
          component = root / "custom_components" / "solem_blip"
          excluded_names = {".DS_Store", ".coverage"}
          excluded_suffixes = {".pyc"}
          top_level_files = ["hacs.json", "README.md", "LICENSE"]

          dist.mkdir(exist_ok=True)
          with ZipFile(output, "w", ZIP_DEFLATED) as archive:
              for file_path in sorted(component.rglob("*")):
                  if not file_path.is_file():
                      continue
                  if "__pycache__" in file_path.parts:
                      continue
                  if file_path.name in excluded_names or file_path.suffix in excluded_suffixes:
                      continue
                  archive.write(file_path, file_path.relative_to(root))

              for name in top_level_files:
                  archive.write(root / name, name)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: solem-blip-ha
          path: dist/solem-blip-ha.zip
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/solem-blip-ha.zip

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.ref }}" dist/solem-blip-ha.zip --clobber

      - name: Highlight attestation in release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          digest="$(sha256sum dist/solem-blip-ha.zip | cut -d ' ' -f 1)"
          current_notes="$(mktemp)"
          updated_notes="$(mktemp)"

          gh release view "${{ inputs.ref }}" --json body --jq .body > "$current_notes"

          python - "$current_notes" "$updated_notes" "$digest" <<'PY'
          from pathlib import Path
          import textwrap
          import sys

          current_path, updated_path, digest = sys.argv[1:]
          body = Path(current_path).read_text()
          marker = "## Artifact attestation"
          section = textwrap.dedent(f"""\
          {marker}

          This release includes `solem-blip-ha.zip`, generated by GitHub Actions and covered by GitHub artifact attestation.

          Verify the release asset with:

          ```bash
          gh attestation verify solem-blip-ha.zip --repo beelzetron/solem-blip-ha
          ```

          Expected SHA-256 digest:

          ```text
          {digest}
          ```
          """)

          if marker in body:
              body = body.split(marker, 1)[0].rstrip()

          if body:
              body = f"{body}\n\n{section}"
          else:
              body = section

          Path(updated_path).write_text(body)
          PY

          gh release edit "${{ inputs.ref }}" --notes-file "$updated_notes"

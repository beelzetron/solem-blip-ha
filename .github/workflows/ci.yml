name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-scope:
    name: Detect release-only bump
    runs-on: ubuntu-latest
    outputs:
      release_only: ${{ steps.classify.outputs.release_only }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          release_only=false
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ ! "$before" =~ ^0+$ ]]; then
              mapfile -t files < <(git diff --name-only "$before" "$after" | sort)
              expected=(
                "custom_components/solem_blip/manifest.json"
                "pyproject.toml"
              )

              if [[ ${#files[@]} -eq ${#expected[@]} ]]; then
                matches=true
                for index in "${!expected[@]}"; do
                  if [[ "${files[$index]}" != "${expected[$index]}" ]]; then
                    matches=false
                  fi
                done

                if [[ "$matches" == "true" ]] && git diff -U0 "$before" "$after" -- "${expected[@]}" | awk '
                  /^diff --git / || /^index / || /^--- / || /^\+\+\+ / || /^@@ / { next }
                  /^[+-]/ {
                    if ($0 ~ /^[+-][[:space:]]*"version": "[^"]+",?[[:space:]]*$/) next
                    if ($0 ~ /^[+-]version = "[^"]+"[[:space:]]*$/) next
                    bad=1
                  }
                  END { exit bad }
                '; then
                  release_only=true
                fi
              fi
            fi
          fi

          echo "release_only=$release_only" >> "$GITHUB_OUTPUT"

  hassfest:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    needs: release-scope
    if: needs.release-scope.outputs.release_only != 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master

  hacs:
    name: Validate with HACS
    runs-on: ubuntu-latest
    needs: release-scope
    if: needs.release-scope.outputs.release_only != 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main
        with:
          category: integration

  python-sanity:
    name: Python and JSON sanity
    runs-on: ubuntu-latest
    needs: release-scope
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Compile Python sources
        run: python -m compileall -q custom_components

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/solem_blip/manifest.json > /dev/null
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/solem_blip/strings.json > /dev/null
          python -m json.tool custom_components/solem_blip/icons.json > /dev/null
          python -m json.tool custom_components/solem_blip/translations/en.json > /dev/null

      - name: Verify brand icons exist
        run: |
          test -f custom_components/solem_blip/brand/icon.png
          test -f custom_components/solem_blip/brand/icon@2x.png

  pytest:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: release-scope
    if: needs.release-scope.outputs.release_only != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

      - name: Generate coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # coverage-badge imports pkg_resources; setuptools 82+ removes it on Python 3.14
          pip install "setuptools>=69,<81" coverage-badge
          coverage-badge -f -o badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: badges/coverage.svg

  mypy:
    name: Run mypy
    runs-on: ubuntu-latest
    needs: release-scope
    if: needs.release-scope.outputs.release_only != 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy custom_components/solem_blip

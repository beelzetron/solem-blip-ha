name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: Validate with HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  python-sanity:
    name: Python and JSON sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Compile Python sources
        run: python -m compileall -q custom_components

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/solem_blip/manifest.json > /dev/null
          python -m json.tool hacs.json > /dev/null
          python -m json.tool custom_components/solem_blip/strings.json > /dev/null
          python -m json.tool custom_components/solem_blip/icons.json > /dev/null
          python -m json.tool custom_components/solem_blip/translations/en.json > /dev/null

      - name: Verify brand icons exist
        run: |
          test -f custom_components/solem_blip/brand/icon.png
          test -f custom_components/solem_blip/brand/icon@2x.png

  pytest:
    name: Run pytest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

      - name: Generate coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # coverage-badge imports pkg_resources; setuptools 82+ removes it on Python 3.14
          pip install "setuptools>=69,<81" coverage-badge
          coverage-badge -f -o badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: badges/coverage.svg

  mypy:
    name: Run mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy custom_components/solem_blip
